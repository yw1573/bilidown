name: CI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Check formatting
        run: |
          cd server
          gofmt -l .
      - name: Run vet
        run: |
          cd server
          go vet ./...

  go-test:
    name: Go Test
    needs: go-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run Go tests
        working-directory: server
        run: go test ./...

  node-build:
    name: Node Build
    needs: [go-lint, go-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9.15.4 --activate
      - name: Install dependencies
        working-directory: client
        run: pnpm install
      - name: Build client
        working-directory: client
        run: pnpm run build

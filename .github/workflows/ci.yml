name: CI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Check formatting
        run: |
          cd server
          gofmt -l .
      - name: Run vet
        run: |
          cd server
          go vet ./...

  go-test:
    name: Go Test
    needs: go-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config gcc libayatana-appindicator3-dev
      - name: Run Go tests
        working-directory: server
        run: go test ./...

  go-build:
    name: Go Build
    needs: go-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config gcc libayatana-appindicator3-dev
      - name: Build Go binary
        working-directory: server
        run: go build ./...

  node-build:
    name: Node Build
    needs: go-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9.15.4 --activate
      - name: Install dependencies
        working-directory: client
        run: pnpm install
      - name: Build client
        working-directory: client
        run: pnpm run build

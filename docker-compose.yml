services:
  bilidown:
    build: .
    image: bilidown:latest
    container_name: bilidown
    ports:
      - "8098:8098"
    volumes:
      # 数据库目录
      - ./database:/app/database
      # 下载文件目录
      - ./download:/app/download
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
